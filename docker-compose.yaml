services:
  postgres:
    image: postgres:16-alpine
    container_name: rs_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: request_service_db
    ports: 
      - "5433:5432"
    volumes: 
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pdf_processing_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
      
volumes:  
  pgdata: 